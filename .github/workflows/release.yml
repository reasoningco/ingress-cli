name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish npm package and GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      - name: Use npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Fail if version is already published
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published. Bump package.json version before pushing a new release."
            exit 1
          fi

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Verify CLI
        run: node dist/cli/index.js version --json

      - name: Publish to npm
        run: npm publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.package.outputs.version }}" \
            --title "v${{ steps.package.outputs.version }}" \
            --notes "Published ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} to npm."
